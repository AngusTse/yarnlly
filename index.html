<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarnlly - Crochet Creations</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Analytics: Replace 'G-XXXXXXXXXX' with your actual tracking ID -->
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NZZ2JFJ0R3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }

        gtag('config', 'G-NZZ2JFJ0R3');

    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "vseyvxljm5");

    <style>
        :root {
            /* Colors match the Yarnlly logo */
            --primary-pink: #d69896;
            --primary-pink-hover: #c48282;
            --accent-teal: #7caca8;
            --accent-teal-hover: #67928e;
            --bg-color: #fbf9f9;
            --text-color: #4a3e3d;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            margin: 2rem auto;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            width: 200px;
            height: auto;
            margin: 0 auto 1.5rem;
            display: block;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--accent-teal);
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.1rem;
            background-color: var(--primary-pink);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(214, 152, 150, 0.3);
            position: relative;
            overflow: hidden;
        }

        .link-btn:nth-child(1) {
            background-color: var(--primary-pink);
            box-shadow: 0 4px 15px rgba(214, 152, 150, 0.3);
        }

        .link-btn:nth-child(1):hover {
            background-color: var(--primary-pink-hover);
            box-shadow: 0 6px 20px rgba(214, 152, 150, 0.4);
        }

        .link-btn:nth-child(2) {
            background-color: var(--accent-teal);
            box-shadow: 0 4px 15px rgba(124, 172, 168, 0.3);
        }

        .link-btn:nth-child(2):hover {
            background-color: var(--accent-teal-hover);
            box-shadow: 0 6px 20px rgba(124, 172, 168, 0.4);
        }

        .link-btn:nth-child(3) {
            background-color: #fff;
            color: var(--primary-pink);
            border: 2px solid var(--primary-pink);
            box-shadow: none;
        }

        .link-btn:nth-child(3):hover {
            background-color: rgba(214, 152, 150, 0.1);
            transform: translateY(-3px);
        }

        .link-btn:hover {
            transform: translateY(-3px);
        }

        .link-btn i {
            margin-right: 10px;
            font-size: 1.3rem;
            position: absolute;
            left: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #999;
        }

        @media (max-width: 400px) {
            .container {
                padding: 2rem 1.5rem;
            }

            .link-btn i {
                left: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Logo Image -->
        <img src="assets/images/yarnlly-logo-v0.1.png" alt="Yarnlly Logo" class="logo">

        <!-- Only subtitle as logo has brand name -->
        <p class="subtitle">Handmade With Love</p>

        <div class="links-container">
            <!-- Shopify Link -->
            <a href="https://hardclutch.com/collections/yarnlly-crochet" class="link-btn" target="_blank"
                rel="noopener noreferrer">
                <i class="fa-brands fa-shopify"></i>
                Shop Our Collection
            </a>

            <!-- Instagram Link -->
            <a href="https://www.instagram.com/yarnlly.crochet/" class="link-btn" target="_blank"
                rel="noopener noreferrer">
                <i class="fa-brands fa-instagram"></i>
                Follow on Instagram
            </a>

            <!-- Mailto Link -->
            <a href="mailto:yarnlly.shop@gmail.com" class="link-btn">
                <i class="fa-regular fa-envelope"></i>
                Contact Us
            </a>
        </div>

        <footer>
            &copy; 2026 Yarnlly. All rights reserved.
        </footer>
    </div>
</body>

</html>
